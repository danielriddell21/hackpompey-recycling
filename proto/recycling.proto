syntax = "proto3";

package recycling;

option go_package = "github.com/riddler/hackpompey-recycling/go/proto/recycling";

// Messages for recycling items
message RecyclingItem {
  string id = 1;
  string type = 2;
  string description = 3;
  string location = 4;
  int64 created_at = 5;
}

message GetRecyclingItemsRequest {
  string location_filter = 1; // Optional filter by location
}

message GetRecyclingItemsResponse {
  repeated RecyclingItem items = 1;
}

message CreateRecyclingItemRequest {
  RecyclingItem item = 1;
}

message CreateRecyclingItemResponse {
  string id = 1;
}

// Service definition
service RecyclingService {
  rpc GetRecyclingItems(GetRecyclingItemsRequest) returns (GetRecyclingItemsResponse);
  rpc CreateRecyclingItem(CreateRecyclingItemRequest) returns (CreateRecyclingItemResponse);
}