syntax = "proto3";

package recycling;

option go_package = "github.com/riddler/hackpompey-recycling/go/proto/recycling";

// Messages for recycling items
message RecyclingItem {
    enum BinColour {
        BIN_COLOUR_UNKNOWN = 0;
        BLUE = 1;
        GREEN = 2;
        BROWN = 3;
        BLACK = 4;
    }

    enum BinType {
        BIN_TYPE_UNKNOWN = 0;
        PAPER = 1;
        PLASTIC = 2;
        GLASS = 3;
        WASTE = 4;
    }

    bool recyclable = 1;
    string advice = 2;
    BinColour bin_colour = 3;
    BinType bin_type = 4;
}

message CanItBeRecycledRequest {
  string barcode = 1;
}

message CanItBeRecycledResponse {
   RecyclingItem data = 1;
}

// Service definition
service RecyclingService {
  rpc CanItBeRecycled(CanItBeRecycledRequest) returns (CanItBeRecycledResponse);
}